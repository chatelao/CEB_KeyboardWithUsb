name: Automated KiCad Build

on:
  push:
  pull_request:

jobs:
  kibot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Schematic
        run: python3 generate_kicad_sch.py

      - name: Run KiBot
        uses: INTI-CMNB/KiBot@v2_k8
        with:
          config: kibot.yaml
          dir: Generated
          schema: myproject.kicad_sch
          board: myproject.kicad_pcb

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Automatic_Outputs
          path: Generated

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Generated/Docs/Schematic.pdf
            Generated/Docs/PCB.pdf
            Generated/Manufacturing/ibom.html
            Generated/Manufacturing/Gerbers/*
